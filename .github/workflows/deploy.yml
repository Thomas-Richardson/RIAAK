name: Deploy & Update Search

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Full re-embed of the whole vault (ignores hash cache)"
        type: boolean
        default: false

jobs:
  update-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Ingestion
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/ingest.py ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}
